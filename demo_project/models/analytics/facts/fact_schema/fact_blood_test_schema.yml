version: 2

models:
  - name: fact_blood_tests
    description: "Fact table at the grain of one row per blood test event. Stores test details for donors along with the test date as a foreign key to the date dimension."

    columns:
      - name: test_id
        description: "Primary key for the blood test event. Uniquely identifies each test."
        data_type: int
        tests:
          - not_null
          - unique

      - name: donor_sk
        description: "Foreign key to dim_donors (surrogate key) identifying the donor version at the time of the test."
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_donors')
                field: donor_sk

      - name: test_date_id
        description: "Foreign key to dim_dates representing the date the test was performed."
        data_type: int
        tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_id
      

      - name: disease_tested
        description: "Name of the disease or condition tested (e.g., HIV, Hepatitis, etc.)."
        data_type: varchar
        


      - name: result
        description: "Result of the test (e.g., Positive, Negative)."
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['Positive','Negative']

      - name: test_type
        description: "Type of test performed (e.g., screening, blood typing)."
        data_type: varchar
        tests:
          - not_null