version: 2

models:
  - name: dim_dates
    description: "Date dimension table containing one row per calendar date, used for time-based analysis across all facts."
    columns:
      - name: date_id
        description: "Surrogate key for the date in YYYYMMDD format."
        data_type: int
        tests:
          - not_null
          - unique

      - name: full_date
        description: "The actual calendar date."
        data_type: date
        tests:
          - not_null

      - name: day
        description: "Day of the month (1–31)."
        data_type: int
        tests:
          - not_null

      - name: month
        description: "Month number (1–12)."
        data_type: int
        tests:
          - not_null

      - name: month_name
        description: "Full name of the month (e.g., January, February)."
        data_type: varchar
        tests:
          - not_null

      - name: year
        description: "Four-digit year."
        data_type: int
        tests:
          - not_null